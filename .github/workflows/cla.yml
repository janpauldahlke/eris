# CLA Assistant Lite — blocks PRs until each contributor signs in the PR thread.
# Docs: https://github.com/contributor-assistant/github-action
#
# Security: uses pull_request_target (runs in base repo context). Do not add steps
# that execute untrusted PR code in this workflow.
#
# If `main` is branch-protected and the bot cannot commit signatures, add a PAT
# with repo scope as secret PERSONAL_ACCESS_TOKEN and uncomment the env line below.

name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          # Must be a stable https URL contributors can open (raw blob recommended).
          path-to-document: https://raw.githubusercontent.com/janpauldahlke/eris/main/docs/CLA.md
          branch: main
          # GitHub logins exempt from signing (maintainer + automation). Adjust as needed.
          allowlist: janpauldahlke,bot*
