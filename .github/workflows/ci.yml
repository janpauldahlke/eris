# Rust CI: clippy on all targets/features, full test suite.
# Toolchain: https://github.com/dtolnay/rust-toolchain
# Caching: https://github.com/Swatinem/rust-cache

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --bin eris

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Batched: single-process llvm-cov OOMs on GHA (see eris_test_full.rs).
      - name: cargo llvm-cov (tests + Codecov report)
        run: |
          batches=(
            config:: engine::grammar:: engine::router:: engine::token_metrics:: engine::embedding::
            engine::ollama:: engine::llama_cpp:: memory:: executive:: benchmark:: presentation::
            telemetry:: ui:: skills:: workspace:: ingest:: util:: orchestrator::core::
            orchestrator::context:: orchestrator::llm_support:: orchestrator::tool_router::
            orchestrator::state:: "orchestrator::r#loop::" orchestrator::heartbeat:: orchestrator::alarms::
            tools::web:: tools::vault:: tools::agenda:: tools::mail:: tools::gatekeeper::
            tools::moltbook:: tools::memory:: tools::db_rest:: tools::validation:: tools::skills::
            tools::weather:: tools::wiki:: tools::system:: tools::vision:: tools::clock:: tools::calendar::
          )
          for batch in "${batches[@]}"; do
            echo "=== llvm-cov batch: ${batch} ==="
            cargo llvm-cov --no-report test --bin eris "$batch" -- --test-threads=1
          done
          cargo llvm-cov report --codecov --output-path codecov.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: codecov.json
          fail_ci_if_error: false
