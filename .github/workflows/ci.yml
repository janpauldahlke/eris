# Rust CI: clippy, batched tests (OOM-safe), coverage via matrix shards (fresh runner each).
# Toolchain: https://github.com/dtolnay/rust-toolchain
# Caching: https://github.com/Swatinem/rust-cache

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --bin eris

  test:
    name: Test (batched)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test-full
        run: cargo run --quiet --bin eris-test-full

  coverage:
    name: Coverage (${{ matrix.batch }})
    needs: [clippy, test]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        batch:
          - config::
          - engine::grammar::
          - engine::router::
          - engine::token_metrics::
          - engine::embedding::
          - engine::ollama::
          - engine::llama_cpp::
          - memory::
          - executive::
          - benchmark::
          - presentation::
          - telemetry::
          - ui::
          - skills::
          - workspace::
          - ingest::
          - util::
          - orchestrator::core::
          - orchestrator::context::
          - orchestrator::llm_support::
          - orchestrator::tool_router::
          - orchestrator::state::
          - orchestrator::r#loop::
          - orchestrator::heartbeat::
          - orchestrator::alarms::
          - tools::web::
          - tools::vault::
          - tools::agenda::
          - tools::mail::
          - tools::gatekeeper::
          - tools::moltbook::
          - tools::memory::
          - tools::db_rest::
          - tools::validation::
          - tools::skills::
          - tools::weather::
          - tools::wiki::
          - tools::system::
          - tools::vision::
          - tools::clock::
          - tools::calendar::
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # One batch per matrix job: fresh 7GB runner, no cross-batch profraw accumulation.
      - name: cargo llvm-cov (${{ matrix.batch }})
        run: cargo llvm-cov test --bin eris "${{ matrix.batch }}" --codecov --output-path codecov.json -- --test-threads=1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: codecov.json
          fail_ci_if_error: false
