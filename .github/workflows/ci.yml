# Rust CI: clippy on all targets/features, full test suite.
# Toolchain: https://github.com/dtolnay/rust-toolchain
# Caching: https://github.com/Swatinem/rust-cache

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --bin eris

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: cargo llvm-cov (tests + Codecov report)
        run: cargo llvm-cov test --bin eris --codecov --output-path codecov.json -- --test-threads=1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: codecov.json
          fail_ci_if_error: false
