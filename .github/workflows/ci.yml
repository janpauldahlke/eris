# Rust CI: clippy, shared test build, matrix test/coverage shards (OOM + long-job safe).
# Toolchain: https://github.com/dtolnay/rust-toolchain
# Caching: https://github.com/Swatinem/rust-cache

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --bin eris

  # One cold compile per workflow; matrix jobs reuse target/ via rust-cache.
  build-tests:
    name: Build test binary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo build --tests
        run: cargo build --bin eris --tests

  test:
    name: Test (${{ matrix.batch }})
    needs: build-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        batch: &test-batches
          - "config::"
          - "engine::grammar::"
          - "engine::router::"
          - "engine::token_metrics::"
          - "engine::embedding::"
          - "engine::ollama::"
          - "engine::llama_cpp::"
          - "memory::"
          - "executive::"
          - "benchmark::"
          - "presentation::"
          - "telemetry::"
          - "ui::"
          - "skills::"
          - "workspace::"
          - "ingest::"
          - "util::"
          - "orchestrator::core::"
          - "orchestrator::context::"
          - "orchestrator::llm_support::"
          - "orchestrator::tool_router::"
          - "orchestrator::state::"
          - "orchestrator::r#loop::"
          - "orchestrator::heartbeat::"
          - "orchestrator::alarms::"
          - "tools::web::"
          - "tools::vault::"
          - "tools::agenda::"
          - "tools::mail::"
          - "tools::gatekeeper::"
          - "tools::moltbook::"
          - "tools::memory::"
          - "tools::db_rest::"
          - "tools::validation::"
          - "tools::skills::"
          - "tools::weather::"
          - "tools::wiki::"
          - "tools::system::"
          - "tools::vision::"
          - "tools::clock::"
          - "tools::calendar::"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test (${{ matrix.batch }})
        run: |
          set -o pipefail
          batch='${{ matrix.batch }}'
          output="$(cargo test --bin eris "$batch" -- --test-threads=1 2>&1 | tee /dev/stderr)"
          ran="$(printf '%s\n' "$output" | sed -n 's/^running \([0-9][0-9]*\) tests.*/\1/p' | tail -1)"
          if [ -z "$ran" ] || [ "$ran" = "0" ]; then
            echo "ERROR: batch filter matched zero tests: $batch"
            exit 1
          fi

  coverage:
    name: Coverage (${{ matrix.batch }})
    needs: [clippy, test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        batch: *test-batches
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: cargo llvm-cov (${{ matrix.batch }})
        run: |
          set -o pipefail
          batch='${{ matrix.batch }}'
          output="$(
            cargo llvm-cov test --bin eris "$batch" \
              --codecov --output-path codecov.json \
              -- --test-threads=1 2>&1 | tee /dev/stderr
          )"
          ran="$(printf '%s\n' "$output" | sed -n 's/^running \([0-9][0-9]*\) tests.*/\1/p' | tail -1)"
          if [ -z "$ran" ] || [ "$ran" = "0" ]; then
            echo "ERROR: batch filter matched zero tests: $batch"
            exit 1
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: codecov.json
          fail_ci_if_error: false
