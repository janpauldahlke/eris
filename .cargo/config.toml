# test-full spawns a fresh process per module batch (RSS resets; avoids runtime OOM).
# Single-process fallback: cargo test --bin eris -- --test-threads=1
[env]
RUST_TEST_THREADS = "1"

[build]
jobs = 2

[alias]
# Quiet: test output → target/test-full.log only (avoids GNOME terminal compositor stress).
test-full-quiet = ["run", "--quiet", "--bin", "eris-test-full", "--", "--quiet"]
test-full = ["run", "--quiet", "--bin", "eris-test-full", "--", "--quiet"]
t = ["run", "--quiet", "--bin", "eris-test-full", "--", "--quiet"]
# Verbose (CI-style): streams each batch to the terminal.
test-full-verbose = ["run", "--quiet", "--bin", "eris-test-full"]
