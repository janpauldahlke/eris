<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eris — web console</title>
    <style>
      :root,
      [data-theme="dark"] {
        --bg: #080a12;
        --panel: #0a0d18;
        --footer-bg: #0e101a;
        --border: #3f465f;
        --accent: #5ce5be;
        --text: #d6dff8;
        --text-strong: #f5f8ff;
        --muted: #b4bacd;
        --user: #78b4ff;
        --thought-bg: #0e101c;
        --chip-bg: #12162a;
        --rail-bg: #060810;
        --input-bg: #161b2e;
        --input-text: #eef2ff;
        --assistant-text: #f5f8ff;
        --assistant-label-bg: rgba(20, 26, 46, 0.9);
        --badge-bg: #141a2e;
        --telemetry-bg: #0c0e16;
        --telemetry-text: #b8c0d4;
        --telemetry-line-bg: #10131d;
        --telemetry-line-border: #2a3550;
        --tool-activity: #ffd166;
        --status-chip-bg: #12162a;
        --status-chip-border: #232a3e;
        --status-chip-text: #aab6d4;
        --status-chip-k: #6a738c;
        --status-chip-v: #dce4f8;
        --status-pill-plain-bg: #12162a;
        --status-pill-idle-bg: #141822;
        --status-pill-idle-border: #2a3142;
        --status-pill-chat-bg: #0f1f1c;
        --status-pill-chat-border: #2d5c4e;
        --status-pill-reflect-bg: #181428;
        --status-pill-reflect-border: #4a3d6e;
        --status-pill-recover-bg: #22180f;
        --status-pill-recover-border: #5c4428;
        --btn-submit-bg: #1a2f28;
        --btn-submit-hover: #243d35;
        --markdown-strong: #ffffff;
        --markdown-code-bg: #1a2238;
        --markdown-code-border: #2a3555;
        --system-msg: #c8b070;
        --modal-backdrop: rgba(4, 6, 12, 0.72);
        --tel-sys-color: #c8dcff;
        --tel-sys-border: #6eb5ff;
        --tel-tool-color: #ffe6a8;
        --tel-tool-border: #ffd166;
        --tel-ui-color: #aab6c8;
        --tel-ui-border: #8899aa;
        --tel-alarm-color: #ffc4c4;
        --tel-alarm-border: #ff6b6b;
        --tel-fcp-color: #b8f5e4;
        --tel-def-border: #4a5568;
        --state-idle: #8a93a8;
        --state-chat: #5ce5be;
        --state-reflect: #b388ff;
        --state-recover: #ffb347;
        --state-unknown: #8899cc;
      }
      [data-theme="light"] {
        --bg: #e8ecf4;
        --panel: #ffffff;
        --footer-bg: #dce3f0;
        --border: #a8b4cc;
        --accent: #0a6b55;
        --text: #1a2238;
        --text-strong: #0b1220;
        --muted: #4a5568;
        --user: #1456a8;
        --thought-bg: #f4f6fb;
        --chip-bg: #e8ecf4;
        --rail-bg: #d0d9ea;
        --input-bg: #ffffff;
        --input-text: #0b1220;
        --assistant-text: #1a2238;
        --assistant-label-bg: rgba(232, 236, 244, 0.95);
        --badge-bg: #e8ecf4;
        --telemetry-bg: #eef2f9;
        --telemetry-text: #3d4a62;
        --telemetry-line-bg: #ffffff;
        --telemetry-line-border: #c5cede;
        --tool-activity: #9a6b00;
        --status-chip-bg: #ffffff;
        --status-chip-border: #b8c4d8;
        --status-chip-text: #3d4a62;
        --status-chip-k: #6a738c;
        --status-chip-v: #0b1220;
        --status-pill-plain-bg: #ffffff;
        --status-pill-idle-bg: #f0f3fa;
        --status-pill-idle-border: #b8c4d8;
        --status-pill-chat-bg: #e6f5f0;
        --status-pill-chat-border: #7ab8a8;
        --status-pill-reflect-bg: #efeaf8;
        --status-pill-reflect-border: #b0a0d8;
        --status-pill-recover-bg: #faf0e4;
        --status-pill-recover-border: #d4a86a;
        --btn-submit-bg: #e6f5f0;
        --btn-submit-hover: #d0ebe3;
        --markdown-strong: #0b1220;
        --markdown-code-bg: #e8ecf4;
        --markdown-code-border: #b8c4d8;
        --system-msg: #8a6b20;
        --modal-backdrop: rgba(20, 28, 48, 0.45);
        --tel-sys-color: #1d5fa8;
        --tel-sys-border: #4a8fd4;
        --tel-tool-color: #7a5a10;
        --tel-tool-border: #c9a030;
        --tel-ui-color: #4a5568;
        --tel-ui-border: #8a93a8;
        --tel-alarm-color: #a83030;
        --tel-alarm-border: #d45050;
        --tel-fcp-color: #0a6b55;
        --tel-def-border: #8a93a8;
        --state-idle: #6a738c;
        --state-chat: #0a6b55;
        --state-reflect: #6b4fa8;
        --state-recover: #b86e1a;
        --state-unknown: #5a6a8a;
      }
      [data-theme="warm"] {
        --bg: #14100c;
        --panel: #1c1610;
        --footer-bg: #18120e;
        --border: #5c4a38;
        --accent: #e8b86d;
        --text: #f0e6d8;
        --text-strong: #fff8f0;
        --muted: #b8a894;
        --user: #8eb8e8;
        --thought-bg: #18120e;
        --chip-bg: #221a14;
        --rail-bg: #100c08;
        --input-bg: #241c14;
        --input-text: #fff8f0;
        --assistant-text: #fff8f0;
        --assistant-label-bg: rgba(34, 26, 20, 0.92);
        --badge-bg: #221a14;
        --telemetry-bg: #120e0a;
        --telemetry-text: #c8b8a4;
        --telemetry-line-bg: #1a1410;
        --telemetry-line-border: #4a3828;
        --tool-activity: #e8c86d;
        --status-chip-bg: #221a14;
        --status-chip-border: #4a3828;
        --status-chip-text: #d8c8b4;
        --status-chip-k: #9a8a78;
        --status-chip-v: #fff8f0;
        --status-pill-plain-bg: #221a14;
        --status-pill-idle-bg: #1e1814;
        --status-pill-idle-border: #4a3828;
        --status-pill-chat-bg: #2a2014;
        --status-pill-chat-border: #6a5030;
        --status-pill-reflect-bg: #241c28;
        --status-pill-reflect-border: #5a4068;
        --status-pill-recover-bg: #2a1c10;
        --status-pill-recover-border: #7a5028;
        --btn-submit-bg: #2a2014;
        --btn-submit-hover: #3a2c1c;
        --markdown-strong: #fff8f0;
        --markdown-code-bg: #2a2018;
        --markdown-code-border: #5c4a38;
        --system-msg: #d8b060;
        --modal-backdrop: rgba(8, 6, 4, 0.78);
        --tel-sys-color: #b8d8ff;
        --tel-sys-border: #6a98d8;
        --tel-tool-color: #ffe8a8;
        --tel-tool-border: #e8b86d;
        --tel-ui-color: #c8b8a4;
        --tel-ui-border: #8a7a68;
        --tel-alarm-color: #ffc8c8;
        --tel-alarm-border: #e87878;
        --tel-fcp-color: #e8d8a8;
        --tel-def-border: #6a5a48;
        --state-idle: #9a8a78;
        --state-chat: #e8b86d;
        --state-reflect: #c9a0ff;
        --state-recover: #ff9f5a;
        --state-unknown: #a09080;
      }
      * {
        box-sizing: border-box;
      }
      html {
        height: 100%;
      }
      body {
        margin: 0;
        height: 100%;
        max-height: 100dvh;
        min-width: 1024px;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 14px;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: row;
        min-height: 0;
        overflow: hidden;
      }
      .left-rail {
        flex-shrink: 0;
        width: 48px;
        background: var(--rail-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: stretch;
        transition: width 0.15s ease;
        z-index: 10;
      }
      .left-rail.expanded {
        width: 200px;
      }
      .rail-toggle {
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--border);
        color: var(--muted);
        cursor: pointer;
        padding: 0.65rem 0.5rem;
        font: inherit;
        font-size: 11px;
      }
      .rail-toggle:hover {
        color: var(--accent);
      }
      .rail-nav {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
        padding: 0.35rem 0.25rem;
        flex: 1;
      }
      .rail-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 4px;
        color: var(--muted);
        cursor: pointer;
        padding: 0.45rem 0.4rem;
        font: inherit;
        font-size: 12px;
        text-align: left;
        white-space: nowrap;
      }
      .rail-btn:hover,
      .rail-btn.active {
        color: var(--accent);
        border-color: var(--border);
        background: var(--chip-bg);
      }
      .rail-btn .rail-icon {
        flex-shrink: 0;
        width: 1.25rem;
        height: 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .rail-btn .rail-icon svg {
        width: 1.1rem;
        height: 1.1rem;
        display: block;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.75;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .rail-toggle svg {
        width: 1rem;
        height: 1rem;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .rail-btn .rail-label {
        overflow: hidden;
        opacity: 0;
        max-width: 0;
        transition: opacity 0.12s ease, max-width 0.15s ease;
      }
      .left-rail.expanded .rail-btn .rail-label {
        opacity: 1;
        max-width: 10rem;
      }
      .app-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
      }
      .app-header {
        flex-shrink: 0;
        padding: 0.6rem 1rem;
        border-bottom: 1px solid var(--border);
        color: var(--accent);
        letter-spacing: 0.04em;
      }
      .app-main {
        flex: 1 1 0;
        display: grid;
        grid-template-columns: minmax(0, 2fr) minmax(220px, 1fr);
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 0;
        min-height: 0;
        overflow: hidden;
      }
      #transcript {
        grid-column: 1;
        grid-row: 1;
        min-height: 0;
        overflow: auto;
        padding: 1rem;
        background: var(--panel);
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }
      .right-stack {
        grid-column: 2;
        grid-row: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        border-bottom: 1px solid var(--border);
        background: var(--thought-bg);
      }
      .panel-section {
        display: flex;
        flex-direction: column;
        min-height: 0;
        flex: 1 1 0;
      }
      .panel-section h2 {
        margin: 0;
        padding: 0.5rem 0.75rem 0.2rem;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--accent);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .panel-section.telemetry-section {
        border-top: 1px solid var(--border);
        flex: 1 1 0;
        min-height: 7rem;
      }
      #thought-pane {
        flex: 1 1 0;
        min-height: 0;
        overflow: auto;
        padding: 0.5rem 0.75rem 0.75rem;
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }
      .thought-entry {
        padding: 0.45rem 0.5rem;
        border-radius: 4px;
        background: var(--chip-bg);
        border: 1px solid var(--border);
        white-space: pre-wrap;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }
      .thought-entry:last-child {
        border-color: var(--accent);
      }
      #tools-activity {
        flex-shrink: 0;
        max-height: min(28vh, 7rem);
        overflow-y: auto;
        padding: 0.45rem 0.75rem;
        font-size: 11px;
        color: var(--tool-activity);
        border-bottom: 1px solid var(--border);
        min-height: 1.5em;
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
      }
      #tools-activity:empty {
        display: none;
      }
      #telemetry-log {
        flex: 1 1 0;
        min-height: 0;
        overflow: auto;
        padding: 0.45rem 0.75rem;
        font-size: 11px;
        line-height: 1.45;
        color: var(--telemetry-text);
        background: var(--telemetry-bg);
      }
      .telemetry-line {
        margin: 0 0 0.35rem 0;
        padding: 0.35rem 0.45rem;
        border-radius: 3px;
        border-left: 3px solid var(--telemetry-line-border);
        white-space: pre-wrap;
        word-break: break-word;
        background: var(--telemetry-line-bg);
        color: var(--telemetry-text);
      }
      .telemetry-line:last-child {
        margin-bottom: 0;
      }
      .telemetry-sys {
        border-left-color: var(--tel-sys-border);
        color: var(--tel-sys-color);
      }
      .telemetry-tool {
        border-left-color: var(--tel-tool-border);
        color: var(--tel-tool-color);
      }
      .telemetry-ui {
        border-left-color: var(--tel-ui-border);
        color: var(--tel-ui-color);
      }
      .telemetry-alarm {
        border-left-color: var(--tel-alarm-border);
        color: var(--tel-alarm-color);
      }
      .telemetry-fcp {
        border-left-color: var(--accent);
        color: var(--tel-fcp-color);
      }
      .telemetry-def {
        border-left-color: var(--tel-def-border);
      }
      .msg {
        margin-bottom: 0.85rem;
        line-height: 1.55;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .msg.user {
        color: var(--user);
      }
      .msg.user .user-body {
        font-weight: 600;
        color: var(--user);
      }
      .msg.user .src-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 0.12rem 0.4rem;
        margin-right: 0.45rem;
        border-radius: 3px;
        vertical-align: text-bottom;
        line-height: 1.2;
        background: var(--badge-bg);
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .msg.user .src-badge.src-discord {
        border-color: #5865f2;
        color: #aab4ff;
      }
      .msg.user .src-badge.src-web {
        border-color: #3d5a7a;
        color: #8eb8e8;
      }
      .msg.user .src-badge.src-cli {
        border-color: #2d5c4e;
        color: var(--accent);
      }
      .msg.assistant {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0.35rem;
        color: var(--assistant-text);
      }
      .msg.assistant .agent-label {
        flex-shrink: 0;
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 0.02em;
        padding: 0.15rem 0.45rem;
        border-radius: 4px;
        align-self: flex-start;
        background: var(--assistant-label-bg);
        border-left: 3px solid currentColor;
      }
      .msg.assistant .agent-body.markdown-body {
        padding-left: 0.15rem;
      }
      .markdown-body strong {
        color: var(--markdown-strong);
        font-weight: 700;
      }
      .markdown-body code {
        font-size: 0.92em;
        background: var(--markdown-code-bg);
        padding: 0.08rem 0.28rem;
        border-radius: 3px;
        border: 1px solid var(--markdown-code-border);
        color: var(--text);
      }
      .msg.system {
        color: var(--system-msg);
      }
      .app-footer {
        grid-column: 1 / -1;
        flex-shrink: 0;
        border-top: 1px solid var(--border);
        padding: 0.55rem 1rem 0.65rem;
        background: var(--footer-bg);
        min-height: 0;
      }
      .status-hud {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 0.45rem 0.65rem;
        margin-bottom: 0.55rem;
        font-size: 11px;
        line-height: 1.4;
        color: var(--muted);
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border: 1px solid transparent;
        flex-shrink: 0;
      }
      .status-pill.state-idle {
        color: var(--state-idle);
        background: var(--status-pill-idle-bg);
        border-color: var(--status-pill-idle-border);
      }
      .status-pill.state-chat {
        color: var(--state-chat);
        background: var(--status-pill-chat-bg);
        border-color: var(--status-pill-chat-border);
      }
      .status-pill.state-reflect {
        color: var(--state-reflect);
        background: var(--status-pill-reflect-bg);
        border-color: var(--status-pill-reflect-border);
      }
      .status-pill.state-recover {
        color: var(--state-recover);
        background: var(--status-pill-recover-bg);
        border-color: var(--status-pill-recover-border);
      }
      .status-pill.state-unknown {
        color: var(--state-unknown);
        background: var(--status-pill-idle-bg);
        border-color: var(--status-pill-idle-border);
      }
      .status-pill.state-plain {
        text-transform: none;
        letter-spacing: normal;
        font-weight: 600;
        color: var(--muted);
        background: var(--status-pill-plain-bg);
        border-color: var(--border);
        max-width: 100%;
        white-space: normal;
      }
      @keyframes status-busy {
        0%,
        100% {
          transform: translateX(0);
          opacity: 1;
        }
        35% {
          transform: translateX(-1px) rotate(-0.4deg);
          opacity: 0.88;
        }
        70% {
          transform: translateX(1px) rotate(0.4deg);
          opacity: 0.88;
        }
      }
      .status-pill.status-pill--busy {
        animation: status-busy 1.15s ease-in-out infinite;
      }
      .status-metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        align-items: center;
        flex: 1 1 12rem;
        min-width: 0;
      }
      .status-chip {
        display: inline-flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 0.25rem 0.4rem;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        background: var(--status-chip-bg);
        border: 1px solid var(--status-chip-border);
        color: var(--status-chip-text);
        font-size: 11px;
        max-width: 100%;
      }
      .status-chip .k {
        color: var(--status-chip-k);
        font-weight: 600;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .status-chip .v {
        color: var(--status-chip-v);
        font-weight: 600;
      }
      .compose-stack {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        min-width: 0;
        width: 100%;
      }
      #chat-form {
        display: flex;
        align-items: flex-end;
        gap: 0.5rem;
        min-height: 0;
        width: 100%;
      }
      #message-input {
        flex: 1 1 auto;
        min-height: 2.5rem;
        max-height: min(32vh, 14rem);
        resize: none;
        overflow-y: auto;
        background: var(--input-bg);
        border: 1px solid var(--border);
        color: var(--input-text);
        caret-color: var(--accent);
        padding: 0.5rem 0.75rem;
        border-radius: 4px;
        font-family: inherit;
        font-size: inherit;
        line-height: 1.45;
      }
      #message-input::placeholder {
        color: var(--muted);
        opacity: 0.85;
      }
      #message-input:focus {
        outline: 2px solid color-mix(in srgb, var(--accent) 45%, transparent);
        border-color: var(--accent);
      }
      button[type="submit"] {
        background: var(--btn-submit-bg);
        border: 1px solid var(--accent);
        color: var(--accent);
        padding: 0.5rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
      }
      button[type="submit"]:hover {
        background: var(--btn-submit-hover);
      }
      .shutdown-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: var(--modal-backdrop);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .shutdown-overlay.hidden {
        display: none;
      }
      .shutdown-card {
        max-width: 28rem;
        padding: 1.5rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
      }
      .shutdown-card h2 {
        margin: 0 0 0.75rem 0;
        font-size: 1rem;
        color: var(--accent);
        letter-spacing: 0.04em;
      }
      .shutdown-card p {
        margin: 0;
        font-size: 13px;
        color: var(--muted);

          </div>
          <div id="audio-chip" aria-live="polite" hidden>
            <span id="audio-chip-label">Voice</span>
            <audio id="audio-preview" controls preload="metadata"></audio>
            <button type="button" id="audio-remove">×</button>
          </div>
          <div class="compose-row">
            <div class="compose-toolbar" id="compose-toolbar" hidden>
              <button
                type="button"
                id="audio-mic-btn"
                title="Record voice (click to start, click again to send)"
                aria-label="Record voice"
                hidden
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
                  <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
                  <line x1="12" y1="19" x2="12" y2="22"/>
                </svg>
              </button>
            </div>
            <form id="chat-form" autocomplete="off">
            <textarea
              id="message-input"
              rows="1"
              placeholder="Message… Enter = send, Shift+Enter = newline (Esc = cancel turn)"
            ></textarea>
            <button type="submit">Send</button>
          </form>
          </div>
        </div>
      </footer>
    </main>
    </div>
    <div
      id="console-modal"
      class="console-modal hidden"
      role="dialog"
      aria-modal="true"
      aria-hidden="true"
    >
      <div class="console-modal-card">
        <div class="console-modal-head">
          <h2 id="console-modal-title">Panel</h2>
          <button type="button" class="console-modal-close" id="console-modal-close">Esc</button>
        </div>
        <div class="console-modal-body" id="console-modal-body"></div>
      </div>
    </div>
    <div id="console-toast" class="console-toast hidden" role="status" aria-live="polite"></div>
    <div
      id="shutdown-overlay"
      class="shutdown-overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="shutdown-overlay-title"
      aria-hidden="true"
    >
      <div class="shutdown-card">
        <h2 id="shutdown-overlay-title">Shutting down</h2>
        <p id="shutdown-overlay-detail">
          Stopping Eris and releasing resources…
        </p>
      </div>
    </div>
    <script src="/assets/chat.js"></script>
    <script src="/assets/console.js"></script>
  </body>
</html>
