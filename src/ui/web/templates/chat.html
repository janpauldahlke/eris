<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eris — web console</title>
    <style>
      :root {
        --bg: #080a12;
        --panel: #0a0d18;
        --border: #3f465f;
        --accent: #5ce5be;
        --text: #d6dff8;
        --muted: #b4bacd;
        --user: #78b4ff;
        --thought-bg: #0e101c;
        --state-idle: #8a93a8;
        --state-chat: #5ce5be;
        --state-reflect: #b388ff;
        --state-recover: #ffb347;
        --state-unknown: #8899cc;
      }
      * {
        box-sizing: border-box;
      }
      html {
        height: 100%;
      }
      body {
        margin: 0;
        height: 100%;
        max-height: 100dvh;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 14px;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }
      .app-header {
        flex-shrink: 0;
        padding: 0.6rem 1rem;
        border-bottom: 1px solid var(--border);
        color: var(--accent);
        letter-spacing: 0.04em;
      }
      .app-main {
        flex: 1 1 0;
        display: grid;
        grid-template-columns: 1fr minmax(240px, 30vw);
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 0;
        min-height: 0;
        overflow: hidden;
      }
      #transcript {
        grid-column: 1;
        grid-row: 1;
        min-height: 0;
        overflow: auto;
        padding: 1rem;
        background: var(--panel);
        border-right: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }
      .right-stack {
        grid-column: 2;
        grid-row: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        border-bottom: 1px solid var(--border);
        background: var(--thought-bg);
      }
      .panel-section {
        display: flex;
        flex-direction: column;
        min-height: 0;
        flex: 1 1 0;
      }
      .panel-section h2 {
        margin: 0;
        padding: 0.5rem 0.75rem 0.2rem;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--accent);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .panel-section.telemetry-section {
        border-top: 1px solid var(--border);
        flex: 1 1 0;
        min-height: 7rem;
      }
      #thought-pane {
        flex: 1 1 0;
        min-height: 0;
        overflow: auto;
        padding: 0.5rem 0.75rem 0.75rem;
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }
      .thought-entry {
        padding: 0.45rem 0.5rem;
        border-radius: 4px;
        background: #12162a;
        border: 1px solid #1e2438;
        white-space: pre-wrap;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        overflow-wrap: anywhere;
      }
      .thought-entry:last-child {
        border-color: #2a3555;
      }
      #tools-activity {
        flex-shrink: 0;
        max-height: min(28vh, 7rem);
        overflow-y: auto;
        padding: 0.45rem 0.75rem;
        font-size: 11px;
        color: #ffd166;
        border-bottom: 1px solid var(--border);
        min-height: 1.5em;
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
      }
      #tools-activity:empty {
        display: none;
      }
      #telemetry-log {
        flex: 1 1 0;
        min-height: 0;
        overflow: auto;
        padding: 0.45rem 0.75rem;
        font-size: 11px;
        line-height: 1.45;
        color: #b8c0d4;
        background: #0c0e16;
      }
      .telemetry-line {
        margin: 0 0 0.35rem 0;
        padding: 0.35rem 0.45rem;
        border-radius: 3px;
        border-left: 3px solid #2a3550;
        white-space: pre-wrap;
        word-break: break-word;
        background: #10131d;
      }
      .telemetry-line:last-child {
        margin-bottom: 0;
      }
      .telemetry-sys {
        border-left-color: #6eb5ff;
        color: #c8dcff;
      }
      .telemetry-tool {
        border-left-color: #ffd166;
        color: #ffe6a8;
      }
      .telemetry-ui {
        border-left-color: #8899aa;
        color: #aab6c8;
      }
      .telemetry-alarm {
        border-left-color: #ff6b6b;
        color: #ffc4c4;
      }
      .telemetry-fcp {
        border-left-color: var(--accent);
        color: #b8f5e4;
      }
      .telemetry-def {
        border-left-color: #4a5568;
      }
      .msg {
        margin-bottom: 0.85rem;
        line-height: 1.55;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }
      .msg.user {
        color: var(--user);
      }
      .msg.user .user-body {
        font-weight: 600;
        color: var(--user);
      }
      .msg.user .src-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 0.12rem 0.4rem;
        margin-right: 0.45rem;
        border-radius: 3px;
        vertical-align: text-bottom;
        line-height: 1.2;
        background: #141a2e;
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .msg.user .src-badge.src-discord {
        border-color: #5865f2;
        color: #aab4ff;
      }
      .msg.user .src-badge.src-web {
        border-color: #3d5a7a;
        color: #8eb8e8;
      }
      .msg.user .src-badge.src-cli {
        border-color: #2d5c4e;
        color: var(--accent);
      }
      .msg.assistant {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0.35rem;
        color: #f5f8ff;
      }
      .msg.assistant .agent-label {
        flex-shrink: 0;
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 0.02em;
        padding: 0.15rem 0.45rem;
        border-radius: 4px;
        align-self: flex-start;
        background: rgba(20, 26, 46, 0.85);
        border-left: 3px solid currentColor;
      }
      .msg.assistant .agent-body.markdown-body {
        padding-left: 0.15rem;
      }
      .markdown-body strong {
        color: #fff;
        font-weight: 700;
      }
      .markdown-body code {
        font-size: 0.92em;
        background: #1a2238;
        padding: 0.08rem 0.28rem;
        border-radius: 3px;
        border: 1px solid #2a3555;
      }
      .msg.system {
        color: #c8b070;
      }
      .app-footer {
        grid-column: 1 / -1;
        flex-shrink: 0;
        border-top: 1px solid var(--border);
        padding: 0.55rem 1rem 0.65rem;
        background: #0e101a;
        min-height: 0;
      }
      .status-hud {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 0.45rem 0.65rem;
        margin-bottom: 0.55rem;
        font-size: 11px;
        line-height: 1.4;
        color: var(--muted);
      }
      .status-pill {
        display: inline-flex;
        align-items: center;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border: 1px solid transparent;
        flex-shrink: 0;
      }
      .status-pill.state-idle {
        color: var(--state-idle);
        background: #141822;
        border-color: #2a3142;
      }
      .status-pill.state-chat {
        color: var(--state-chat);
        background: #0f1f1c;
        border-color: #2d5c4e;
      }
      .status-pill.state-reflect {
        color: var(--state-reflect);
        background: #181428;
        border-color: #4a3d6e;
      }
      .status-pill.state-recover {
        color: var(--state-recover);
        background: #22180f;
        border-color: #5c4428;
      }
      .status-pill.state-unknown {
        color: var(--state-unknown);
        background: #141822;
        border-color: #2a3142;
      }
      .status-pill.state-plain {
        text-transform: none;
        letter-spacing: normal;
        font-weight: 600;
        color: var(--muted);
        background: #12162a;
        border-color: var(--border);
        max-width: 100%;
        white-space: normal;
      }
      @keyframes status-busy {
        0%,
        100% {
          transform: translateX(0);
          opacity: 1;
        }
        35% {
          transform: translateX(-1px) rotate(-0.4deg);
          opacity: 0.88;
        }
        70% {
          transform: translateX(1px) rotate(0.4deg);
          opacity: 0.88;
        }
      }
      .status-pill.status-pill--busy {
        animation: status-busy 1.15s ease-in-out infinite;
      }
      .status-metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        align-items: center;
        flex: 1 1 12rem;
        min-width: 0;
      }
      .status-chip {
        display: inline-flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 0.25rem 0.4rem;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        background: #12162a;
        border: 1px solid #232a3e;
        color: #aab6d4;
        font-size: 11px;
        max-width: 100%;
      }
      .status-chip .k {
        color: #6a738c;
        font-weight: 600;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .status-chip .v {
        color: #dce4f8;
        font-weight: 600;
      }
      #chat-form {
        display: flex;
        align-items: flex-end;
        gap: 0.5rem;
        min-height: 0;
      }
      #message-input {
        flex: 1 1 auto;
        min-height: 2.5rem;
        max-height: min(32vh, 14rem);
        resize: none;
        overflow-y: auto;
        background: #12162a;
        border: 1px solid var(--border);
        color: var(--text);
        padding: 0.5rem 0.75rem;
        border-radius: 4px;
        font-family: inherit;
        font-size: inherit;
        line-height: 1.45;
      }
      #message-input:focus {
        outline: 1px solid var(--accent);
        border-color: var(--accent);
      }
      button[type="submit"] {
        background: #1a2f28;
        border: 1px solid var(--accent);
        color: var(--accent);
        padding: 0.5rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
      }
      button[type="submit"]:hover {
        background: #243d35;
      }
      .shutdown-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(6, 8, 16, 0.94);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .shutdown-overlay.hidden {
        display: none;
      }
      .shutdown-card {
        max-width: 28rem;
        padding: 1.5rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
      }
      .shutdown-card h2 {
        margin: 0 0 0.75rem 0;
        font-size: 1rem;
        color: var(--accent);
        letter-spacing: 0.04em;
      }
      .shutdown-card p {
        margin: 0;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.55;
      }
      @media (max-width: 720px) {
        .app-main {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr) minmax(0, 1fr) auto;
        }
        #transcript {
          grid-column: 1;
          grid-row: 1;
          border-right: none;
        }
        .right-stack {
          grid-column: 1;
          grid-row: 2;
          flex-direction: column;
          border-right: none;
        }
        .panel-section.telemetry-section {
          min-height: 5rem;
        }
        .app-footer {
          grid-row: 3;
        }
      }
    </style>
  </head>
  <body>
    <header class="app-header">ERIS — web console</header>
    <main class="app-main">
      <div id="transcript" aria-label="Chat transcript"></div>
      <aside class="right-stack" aria-label="Side panels">
        <div class="panel-section" aria-label="Model thought">
          <h2>Thought</h2>
          <div id="thought-pane" role="log" aria-live="polite"></div>
        </div>
        <div
          class="panel-section telemetry-section"
          aria-label="Tools and system telemetry"
        >
          <h2>Telemetry</h2>
          <div id="tools-activity" aria-live="polite"></div>
          <div id="telemetry-log" aria-live="polite"></div>
        </div>
      </aside>
      <footer class="app-footer">
        <div id="status-hud" class="status-hud" aria-live="polite">
          <span id="status-state" class="status-pill state-plain"></span>
          <div id="status-metrics" class="status-metrics" style="display: none">
            <span id="status-core" class="status-chip"></span>
            <span id="status-timing" class="status-chip"></span>
            <span id="status-tokens" class="status-chip"></span>
            <span id="status-speed" class="status-chip"></span>
          </div>
        </div>
        <form id="chat-form" autocomplete="off">
          <textarea
            id="message-input"
            rows="1"
            placeholder="Message… Enter = send, Shift+Enter = newline (Esc = cancel turn)"
          ></textarea>
          <button type="submit">Send</button>
        </form>
      </footer>
    </main>
    <div
      id="shutdown-overlay"
      class="shutdown-overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="shutdown-overlay-title"
      aria-hidden="true"
    >
      <div class="shutdown-card">
        <h2 id="shutdown-overlay-title">Shutting down</h2>
        <p id="shutdown-overlay-detail">
          Stopping Eris and releasing resources…
        </p>
      </div>
    </div>
    <script src="/assets/chat.js"></script>
  </body>
</html>
